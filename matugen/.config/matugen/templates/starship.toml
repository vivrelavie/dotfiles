# Preset from:
# https://starship.rs/presets/pastel-powerline

"$schema" = 'https://starship.rs/config-schema.json'
palette = "matugen"
format = """
[оӮ¶](color5)\
$username\
[оӮ°](fg:color5 bg:color6)\
$directory\
[оӮ°](fg:color6 bg:color12)\
$git_branch\
$git_status\
[оӮ°](fg:color12 bg:color13)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$maven\
$nodejs\
$bun\
$nim\
$rust\
$scala\
[оӮ°](fg:color13 bg:color14)\
$docker_context\
[оӮ°](fg:color14 bg:color15)\
$time\
[оӮ°](fg:color15)\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

[username]
show_always = true
style_user = "fg:color15 bg:color5"
style_root = "fg:color15 bg:color5"
format = '[вӮҠЛҡвҠ№вҷЎ б“ҡвӮҚ ^. .^вӮҺ  ]($style)'
disabled = false

[os]
style = "fg:color15 bg:color5"
disabled = true

[directory]
style = "fg:color5 bg:color6"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[c]
symbol = "оҳһ "
style = "fg:color5 bg:color13"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = "оҳқ "
style = "fg:color5 bg:color13"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "пҢҲ "
style = "fg:color5 bg:color14"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = "оүө "
style = "fg:color5 bg:color13"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = "оҳ¬ "
style = "fg:color5 bg:color13"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = "пҗҳ"
style = "fg:color5 bg:color12"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:color5 bg:color12"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = "оҳ§ "
style = "fg:color5 bg:color13"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "fg:color5 bg:color13"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = "оқ· "
style = "fg:color5 bg:color13"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = "оү– "
style = "fg:color5 bg:color13"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = "оҳӨ "
style = "fg:color5 bg:color13"
format = '[ $symbol ($version) ]($style)'

[maven]
style = "fg:color5 bg:color13"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = "оңҳ"
style = "fg:color5 bg:color13"
format = '[ $symbol ($version) ]($style)'

[bun]
symbol = "оқҜ"
style = "fg:color5 bg:color13"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "у°ҶҘ "
style = "fg:color5 bg:color13"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = "оһЁ"
style = "fg:color5 bg:color13"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = "оң· "

style = "fg:color5 bg:color13"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R"
style = "fg:color5 bg:color15"
format = '[ у°Јҗ $time ]($style)'

# в”Җв”Җ Colors в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[palettes.matugen]
color0  = "{{colors.background.default.hex}}"
color1  = "{{colors.error.default.hex}}"
color2  = "{{colors.tertiary.default.hex}}"
color3  = "{{colors.secondary_container.default.hex}}"
color4  = "{{colors.tertiary_container.default.hex}}"
color5  = "{{colors.primary.default.hex | to_color | set_lightness: 20 | format: "hex"}}"
color6  = "{{colors.primary.default.hex | to_color | set_lightness: 66 | format: "hex"}}"
color7  = "{{colors.primary.default.hex | to_color | set_lightness: 100 | format: "hex"}}"
color8  = "{{colors.outline.default.hex}}"
color9  = "{{colors.error_container.default.hex}}"
color10 = "{{colors.on_tertiary.default.hex}}"
color11 = "{{colors.on_secondary_container.default.hex}}"
color12 = "{{colors.primary.default.hex | to_color | set_lightness: 76 | format: "hex"}}"
color13 = "{{colors.primary.default.hex | to_color | set_lightness: 86 | format: "hex"}}"
color14 = "{{colors.primary.default.hex | to_color | set_lightness: 94 | format: "hex"}}"
color15 = "{{colors.primary.default.hex | to_color | set_lightness: 100 | format: "hex"}}"
