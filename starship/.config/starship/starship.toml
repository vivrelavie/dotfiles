# Preset from:
# https://starship.rs/presets/pastel-powerline

"$schema" = 'https://starship.rs/config-schema.json'
palette = "matugen"

format = """
[оӮ¶](color5)\
$username\
[оӮ°](fg:color5 bg:color6)\
$directory\
[оӮ°](fg:color6 bg:color12)\
$git_branch\
$git_status\
[оӮ°](fg:color12 bg:color6)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$maven\
$nodejs\
$bun\
$nim\
$rust\
$scala\
[оӮ°](fg:color6 bg:color13)\
$docker_context\
[оӮ°](fg:color13 bg:color15)\
$time\
[оӮ° ](fg:color15)\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like п„   or disable this
# and use the os module below
[username]
show_always = true
style_user = "fg:color7 bg:color5"
style_root = "fg:color7 bg:color5"
format = '[вӮҠЛҡвҠ№вҷЎ б“ҡвӮҚ ^. .^вӮҺ  ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "fg:color7 bg:color5"
disabled = true # Disabled by default

[directory]
style = "fg:color5 bg:color6"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"~" = "оҳ— "
"Documents" = " у°Ҳҷ "
"Downloads" = " пҖҷ "
"Music" = " пҖҒ "
"Pictures" = " пҖҫ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " у°Ҳҷп„Ә "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important у°Ҳҷ " = " у°Ҳҷп„Ә "

[c]
symbol = "оҳһ "
style = "fg:color5 bg:color6"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = "оҳқ "
style = "fg:color5 bg:color6"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "пҢҲ "
style = "fg:color5 bg:color6"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = "оүө "
style = "fg:color5 bg:color6"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = "оҳ¬ "
style = "fg:color5 bg:color6"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = "пҗҳ"
style = "fg:color7 bg:color12"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:color7 bg:color12"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = "оҳ§ "
style = "fg:color5 bg:color6"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "fg:color5 bg:color6"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = "оқ· "
style = "fg:color5 bg:color6"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = "оү– "
style = "fg:color5 bg:color6"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = "оҳӨ "
style = "fg:color5 bg:color6"
format = '[ $symbol ($version) ]($style)'

[maven]
style = "fg:color5 bg:color6"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = "оңҳ"
style = "fg:color5 bg:color6"
format = '[ $symbol ($version) ]($style)'

[bun]
symbol = "оқҜ"
style = "fg:color5 bg:color6"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "у°ҶҘ "
style = "fg:color5 bg:color6"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = "оһЁ"
style = "fg:color5 bg:color6"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = "оң· "
style = "fg:color5 bg:color6"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "fg:color5 bg:color15"
format = '[ у°Јҗ $time ]($style)'

# в”Җв”Җ Colors в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

